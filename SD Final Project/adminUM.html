<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/admin.css">  
  <title>UVote - User Management</title>
  <style>

    /* ── Main ── */
    .main {
      background: #1e4a5a;
      min-height: 100vh;
      padding: 24px 28px;
      overflow-y: auto;
      height: auto;
    }

    /* Search */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: #e8f0f3; border-radius: 30px;
      padding: 10px 18px; margin-bottom: 14px;
    }
    .search-bar svg { width: 20px; height: 20px; stroke: #4a6a7a; fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-bar input {
      border: none; background: none; outline: none;
      font-size: 16px; color: #333; width: 100%;
    }

    /* Filters */
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .filter-row span { font-size: 15px; font-weight: 700; color: #fff; }
    .filter-pill {
      padding: 5px 18px; border-radius: 20px;
      border: 2px solid #c8d8e0; background: transparent;
      color: #fff; font-size: 14px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .filter-pill:hover,
    .filter-pill.active { background: #fff; color: #1e4a5a; border-color: #fff; }

    /* User grid */
    .user-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    /* User card */
    .user-card {
      background: #0d2233;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .user-top {
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: #c8d8e0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .user-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

    .user-info-block { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-size: 16px; font-weight: 900; color: #fff; }
    .user-gmail { font-size: 12px; color: #a0b8c4; }
    .user-role {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #c8d8e0; font-weight: 600;
    }
    .edit-btn {
      background: #3a7bcc; color: #fff;
      border-radius: 10px; padding: 2px 10px;
      font-size: 11px; font-weight: 700;
      text-decoration: none; display: inline-block;
    }
    .user-actions { display: flex; gap: 8px; }
    .btn-active {
      background: #22c55e; color: #fff;
      border-radius: 12px; padding: 3px 14px;
      font-size: 12px; font-weight: 700;
      border: none; cursor: pointer;
    }
    .btn-deactivate {
      background: #1e3a2a; color: #c8d8e0;
      border-radius: 12px; padding: 3px 14px;
      font-size: 12px; font-weight: 700;
      border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-deactivate:hover { background: #2e5040; }

    /* TABLET */
    @media (max-width:1024px){
      
      .main{
        padding:20px;
      }

      .search-bar{
        padding:10px 14px;
      }

      .search-bar input{
        font-size:14px;
      }

      .filter-row{
        gap:8px;
        flex-wrap:wrap;
      }

      .filter-pill{
        font-size:12px;
        padding:5px 14px;
      }

      .user-grid{
        grid-template-columns:1fr;
      }

      .user-card{
        padding:14px;
      }

      .user-top{
        align-items:flex-start;
      }

      .user-avatar{
        width:42px;
        height:42px;
      }

      .user-name{
        font-size:15px;
      }

      .user-gmail{
        font-size:11px;
      }

      .user-role{
        font-size:11px;
        flex-wrap:wrap;
      }

      .edit-btn{
        font-size:10px;
        padding:2px 8px;
      }

      .user-actions{
        margin-top:8px;
        display:flex;
        justify-content:space-between;
        gap:8px;
      }

      .btn-active,
      .btn-deactivate{
        flex:1;
        font-size:11px;
        padding:8px;
      }

    }
    
  /* PHONES (480px and below) */
  @media (max-width:480px){

    .main{
      padding:12px;
    }

    .filter-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    .filter-row span{
      width:100%;
      margin-bottom:4px;
    }

    .filter-pill{
      width:auto;
      text-align:center;
      padding:6px 14px;
    }

    .user-top{
      gap:12px;
    }

    .user-name{
      font-size:14px;
    }

    .user-gmail,
    .user-role{
      font-size:10px;
    }

    .user-actions{
      flex-direction:column;
      gap:8px;
    }

    .btn-active,
    .btn-deactivate{
      width:100%;
    }
  }

  </style>
</head>
