<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVote - Admin Login</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="page">

    <!-- Blobs -->
    <div class="blob blob-tl"></div>
    <div class="blob blob-br"></div>

    <!-- Navbar -->
    <nav class="navbar">
      <a class="brand" href="#">
        <img class="logo" src="Image/uVote-transparent.png" alt="UVote Logo">
        <span class="brand-name">UVote</span>
      </a>
    </nav>

    <!-- Main content -->
    <div class="content">

      <!-- Hero logo -->
      <div class="hero-brand">
        <div class="hero-icon">
          <img src="Image/uVote-transparent.png" alt="UVote Logo">
        </div>
        <span class="hero-name">UVote</span>
      </div>

      <!-- Login form -->
      <form class="login-form" onsubmit="return false;">
        <label for="username">username</label>
        <input type="text" id="username" name="username" autocomplete="off" />

        <label for="password">password</label>
        <input type="password" id="password" name="password" />

        <a href="#" class="forgot-link">Forgot password?</a>

        <a href="adminDB.html" class="login-btn">Login</a>
        <a href="index.html" class="admin-btn">User Login</a>
      </form>

    </div>
  </div>

</body>
</html>
