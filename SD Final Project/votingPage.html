<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
  <title>UVote - Voting Page</title>
  <style>
  
  /* ── Main voting content ── */
  .voting-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; padding: 20px 40px 40px;
  }
  
  .vote-title {
      font-size: 70px; font-weight: 900;
      color: #fff; text-align: center; margin-bottom: 14px;
    }
    
    /* TGA logo banner */
    .award-logo {
      background-color: #fff;
      border-radius: 6px;
      padding: 14px 28px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
    }
    .award-logo-icon img {
        width: 90px;
        height: auto;
    }

    .award-logo-text { font-size: 20px; font-weight: 900; color: #111; line-height: 1.2; }

    .category-title {
      font-size: 30px; font-weight: 900;
      color: #fff; text-align: center; margin-bottom: 24px;
    }

    /* ── Nominees ── */
    .nominees {
      display: flex; gap: 32px; justify-content: center;
      flex-wrap: wrap; align-items: flex-start;
    }
    
    .nominee-logo-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 200px;
    }
    
    .nominee-logo-icon img {
        width: 200px;
        height: 190px;
        border-radius: 5px;
        object-fit: cover;
        display: block;
    }

    .nominee-name {
      font-size: 16px; font-weight: 800;
      color: #fff; text-align: center; line-height: 1.3;
    }

    /* ── Radio circle buttons ── */
    .vote-radio { display: none; }

    .vote-circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      background-color: #d0dde2;
      border: 3px solid #a0b4bc;
      cursor: pointer; display: block;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .vote-radio:checked + .vote-circle {
      background-color: #1e5a6e;
      border-color: #4a9eb5;
      box-shadow: 0 0 0 3px rgba(74,158,181,0.4);
    }

    /* ── Submit button ── */
    .submit {
      margin-top: 30px;
 
    }
    .submit-btn {
      background-color: #1e5a6e; color: #fff;
      border: none; border-radius: 28px;
      padding: 13px 52px; font-size: 18px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      display: inline-block; transition: background 0.2s;
    }
    .submit-btn:hover { background-color: #2e7a90; }

    /* ── Confirmation ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    #confirm:target ~ * .modal-overlay,
    body:has(#confirm:target) .modal-overlay {
      display: flex;
    }

    .modal-box {
      background: #fff; border-radius: 12px;
      padding: 36px 40px; max-width: 380px; width: 90%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .modal-icon {
      width: 60px; height: 60px;
      background-color: #1e5a6e; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .modal-icon svg { width: 30px; height: 30px; stroke: #fff; fill: none; stroke-width: 2.5; }

    .modal-title { font-size: 22px; font-weight: 900; color: #111; margin-bottom: 8px; }

    .modal-sub { font-size: 14px; color: #5a7a8a; margin-bottom: 28px; line-height: 1.5; }

    .modal-btns { display: flex; gap: 12px; justify-content: center; }

    .modal-cancel {
      padding: 10px 28px; border-radius: 22px;
      border: 2px solid #1e5a6e; color: #1e5a6e;
      background: none; font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: background 0.2s, color 0.2s;
    }
    .modal-cancel:hover { background-color: #1e5a6e; color: #fff; }

    .modal-confirm {
      padding: 10px 28px; border-radius: 22px;
      background-color: #1e5a6e; color: #fff;
      border: none; font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: background 0.2s;
    }
    .modal-confirm:hover { background-color: #2e7a90; }

  </style>
</head>
<body>

<!-- :target anchors -->
<span id="confirm"></span>
<span id="success"></span>


<!-- Confirmation Modal -->
<div class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="modal-title">Confirm Your Vote</div>
    <div class="modal-sub">Are you sure you want to submit your vote?<br>This action cannot be undone.</div>
    <div class="modal-btns">
      <a class="modal-cancel" href="votingPage.html">Cancel</a>
      <a class="modal-confirm" href="voteSubmitted.html">Confirm</a>
    </div>
  </div>
</div>

<div class="layout">

  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="Home.html">
        <img class="logo" src="Image/uVote-transparent.png" alt="Uvote Logo">
      <span class="brand-name">UVote</span>
    </a>

    <div class="user-info">
      <span>User</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="User Profile">
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-btn active" href="Home.html">Home</a>
    <a class="nav-btn" href="Settings.html">Settings</a>
    <a class="nav-btn" href="Message.html">Messages</a>
    <a class="nav-btn" href="Schedule.html">Schedule</a>
    <a class="nav-btn" href="requestPending.html">Request</a>
    <div class="sidebar-spacer"></div>
    <a class="nav-btn" href="index.html">Logout</a>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="blob blob-tr"></div>
    <div class="blob blob-bl"></div>

    <div class="voting-content">

      <h1 class="vote-title">Voting Page</h1>

      <!-- TGA Logo -->
      <div class="award-logo">
        <div class="award-logo-icon">
            <img src="https://images.seeklogo.com/logo-png/39/1/the-game-awards-2020-logo-png_seeklogo-393665.png" alt="TGA Logo">
        </div>
    </div>
    
    <div class="category-title">Game Of The Year</div>
    
    <!-- Nominees -->
     
    <div class="nominees">
        
        <div class="nominee-logo-icon">
            <img src="https://assets-prd.ignimgs.com/2025/01/23/33-1737665447926.jpg?crop=1%3A1%2Csmart&format=jpg&auto=webp&quality=80" alt="Clair Obscur">
            <div class="nominee-name">Clair Obscur:<br>Expedition 33</div>
            <input type="radio" name="vote" id="vote1" class="vote-radio" />
            <label for="vote1" class="vote-circle"></label>
        </div>

        <div class="nominee-logo-icon">
            <img src="https://www.cgmagonline.com/wp-content/uploads/2026/03/death-stranding-2-on-the-beach-pc-performance-review-2026-03-18-199810.jpg" alt="Death Stranding 2">
            <div class="nominee-name">Death Stranding 2:<br>On the beach</div>
            <input type="radio" name="vote" id="vote2" class="vote-radio" />
            <label for="vote2" class="vote-circle"></label>
        </div>

        <div class="nominee-logo-icon">
            <img src="https://www.cgmagonline.com/wp-content/uploads/2025/09/hollow-knight-silksong-nintendo-switch-2-review-2025-09-06-163679.jpg" alt="Hollow Knight">
            <div class="nominee-name">Hollow Knight:<br>Silksong</div>
            <input type="radio" name="vote" id="vote3" class="vote-radio" />
            <label for="vote3" class="vote-circle"></label>
        </div>
    
    </div>
    
    <!-- Submit -->
     
    <div class="submit">
        <a class="submit-btn" href="#confirm">Submit Vote</a>
    </div>
        <div class="submit">
            <a class="submit-btn" href="Home.html">Go back</a>
        </div>
      </div>
</main>
</div>

</body>
</html>
