<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
  <title>UVote - Settings</title>
  <style>

    /* to center settings */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Settings card */
    .settings-card {
      background-color: #f0f2f3;
      border-radius: 10px;
      width: 100%; max-width: 720px;
      padding: 24px 32px 28px;
      position: relative; z-index: 1;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .section-title {
      font-size: 20px; font-weight: 900;
      color: #111; margin-bottom: 14px;
    }

    .field-label {
      font-size: 15px; font-weight: 800;
      color: #111; margin-bottom: 6px; margin-top: 14px;
      display: block;
    }

    .field-input {
      width: 100%; background-color: #d6dce0;
      border: none; border-radius: 4px;
      padding: 12px 14px; font-size: 14px;
      color: #1a2e38; outline: none;
      transition: box-shadow 0.2s;
    }
    .field-input:focus { box-shadow: 0 0 0 2px #4a9eb5; }

    /* Bottom section  */
    .bottom-section {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-top: 22px; flex-wrap: wrap; gap: 16px;
    }

    .sub-section { display: flex; flex-direction: column; gap: 10px; }

    .sub-title {
      font-size: 16px; font-weight: 900; color: #111; margin-bottom: 2px;
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: #111;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer; accent-color: #1e5a6e;
    }

    /* ── Save button ── */
    .save-btn {
      display: inline-block;
      background-color: #2d6fa3;
      color: #fff; border: none;
      border-radius: 6px;
      padding: 10px 38px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      text-align: center;
      transition: background 0.2s;
      align-self: flex-end;
      margin-top: auto;
    }
    .save-btn:hover { background-color: #1e5a8a; }

    .save-row {
      width: 100%; display: flex;
      justify-content: flex-end; margin-top: 20px;
    }

    /* ── Success toast (CSS :target) ── */
    .toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background-color: #1e5a6e;
      color: #fff;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 15px; font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      display: flex; align-items: center; gap: 10px;
      z-index: 100; white-space: nowrap;
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
      pointer-events: none;
    }
    .toast-icon {
      width: 22px; height: 22px; background-color: #4a9eb5;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .toast-icon svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* Show toast when #saved is targeted */
    #saved:target ~ .toast,
    .toast:target {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Trick: place toast inside a :target parent */
    #saved:target + .settings-card .toast-placeholder { display: block; }
  </style>
</head>
<body>

<!-- Toast — shown via :target on wrapper -->
<div id="save-wrapper">
  <div class="toast" id="toast-msg">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    Settings saved successfully!
  </div>
</div>

<div class="layout">

  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="Home.html">
        <img class="logo" src="Image/uVote-transparent.png" alt="Uvote Logo">
      <span class="brand-name">UVote</span>
    </a>

    <div class="user-info">
      <span>User</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="User Profile">
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-btn active" href="Home.html">Home</a>
    <a class="nav-btn" href="Settings.html">Settings</a>
    <a class="nav-btn" href="Message.html">Messages</a>
    <a class="nav-btn" href="Schedule.html">Schedule</a>
    <a class="nav-btn" href="requestPending.html">Request</a>
    <div class="sidebar-spacer"></div>
    <a class="nav-btn" href="index.html">Logout</a>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="blob blob-tr"></div>
    <div class="blob blob-bl"></div>

    <!-- :target anchor sits just before the card -->
    <span id="saved"></span>

    <div class="settings-card">

      <div class="section-title">User Settings</div>

      <label class="field-label" for="uname">Change username:</label>
      <input class="field-input" type="text" id="uname" name="uname" autocomplete="off" />

      <label class="field-label" for="pwd">Change password:</label>
      <input class="field-input" type="password" id="pwd" name="pwd" />

      <label class="field-label" for="cpwd">Confirm password:</label>
      <input class="field-input" type="password" id="cpwd" name="cpwd" />

      <!-- Bottom section -->
      <div class="bottom-section">

        <div class="sub-section">
          <div class="sub-title">System Settings</div>
          <label class="checkbox-row">
            <input type="checkbox" checked /> Dark Mode
          </label>
          <label class="checkbox-row">
            <input type="checkbox" /> Light Mode
          </label>
        </div>

        <div class="sub-section">
          <div class="sub-title">Push Notifications?</div>
          <label class="checkbox-row">
            <input type="checkbox" checked /> Yes
          </label>
          <label class="checkbox-row">
            <input type="checkbox" /> No
          </label>
        </div>

      </div>

      <div class="save-row">
        <!-- Clicking this sets #saved as :target, triggering toast -->
        <a class="save-btn" href="#saved">Save</a>
      </div>

    </div>

  </main>
</div>

<!-- Toast shown when #saved is :target -->
<style>
  #saved:target ~ * .toast,
  body:has(#saved:target) .toast {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>

</body>
</html>
