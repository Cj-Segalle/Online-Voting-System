<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/request.css">
  <title>UVote - Request Form</title>
  <style>
    
    /* ── Success toast ── */
    .toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #1e5a6e; color: #fff;
      padding: 13px 28px; border-radius: 30px;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      z-index: 999; opacity: 0; white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    }
    .toast svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.5; }
    body:has(#sent:target) .toast {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }


    /* ── Form card ── */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      width: 100%; max-width: 900px;
      position: relative;
      height: auto; 
      min-height: min-content;
      margin: auto; 

    }
    .form-title {
      text-align: center; font-size: 26px; font-weight: 900;
      color: #111; margin-bottom: 22px;
    }
    .close-btn {
      position: absolute; top: 16px; right: 16px;
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid #333; background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: #333;
      font-size: 20px; font-weight: 900;
      transition: background 0.2s;
    }
    .close-btn:hover { background: #f0f0f0; }

    /* ── Two column layout ── */
    .form-body { 
      display: flex; 
      flex-direction: column; gap: 28px; }

    /* ── Left column ── */
    .section-heading {
      font-size: 20px; font-weight: 900; color: #111;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 14px; font-weight: 800;
      color: #111; margin-bottom: 4px;
    }
    .req { color: #e03030; font-size: 12px; margin-left: 4px; font-weight: 700; }
    .field input[type="text"],
    .field input[type="date"] {
      width: 100%; padding: 7px 12px;
      border: 1.5px solid #bbb; border-radius: 20px;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #1e5a6e; }

    .date-row { display: flex; gap: 24px; margin-bottom: 16px; }
    .date-group { display: flex; flex-direction: column; gap: 4px; }
    .date-group label { font-size: 18px; font-weight: 900; color: #111; }
    .date-group input {
      padding: 7px 16px; border: 1.5px solid #bbb;
      border-radius: 20px; font-size: 13px; outline: none;
    }

    /* Entries section */
    .entries-label {
      font-size: 18px; font-weight: 900; color: #111; margin-bottom: 8px;
    }
    .entries-panel {
      background: #1e3a4a; border-radius: 8px;
      display: grid; grid-template-columns: 160px 1fr 180px;
      overflow: hidden;
    }

    /* Left: image upload */
    .entry-img-col {
      background: #1e3a4a; padding: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .img-placeholder-sm {
      width: 120px; height: 100px; background: #2a4a5a;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-placeholder-sm svg { width: 36px; height: 36px; stroke: #c8d8e0; fill: none; stroke-width: 1.5; }
    .add-img-btn-sm {
      background: #4a7a8a; color: #fff; border: none;
      border-radius: 20px; padding: 5px 16px;
      font-size: 12px; font-weight: 700; cursor: pointer;
    }

    /* Middle: fields */
    .entry-fields-col { background: #1e3a4a; padding: 10px 12px; }
    .entry-fields-col label { font-size: 13px; font-weight: 800; color: #c8d8e0; display: block; margin-bottom: 3px; }
    .entry-fields-col input,
    .entry-fields-col textarea {
      width: 100%; background: #2a4a5a; border: none;
      border-radius: 4px; color: #fff; padding: 5px 8px;
      font-size: 13px; outline: none; margin-bottom: 8px;
    }
    .entry-fields-col textarea { resize: none; height: 50px; }
    .add-entry-btn {
      background: #4a7a8a; color: #fff; border: none;
      border-radius: 20px; padding: 5px 18px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      float: right; margin-top: 4px;
    }

    /* Right: list of entries */
    .entry-list-col { background: #162d3a; padding: 10px 12px; }
    .entry-list-col .list-title {
      font-size: 14px; font-weight: 900; color: #fff; margin-bottom: 8px;
    }
    .entry-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px;
    }
    .entry-thumb {
      width: 28px; height: 28px; background: #2a4a5a;
      border-radius: 3px; flex-shrink: 0;
    }
    .entry-line { flex: 1; height: 2px; background: #3a6a7a; border-radius: 2px; }

    /* ── Right column ── */
    .photo-label {
      font-size: 18px; font-weight: 900; color: #111; margin-bottom: 10px;
    }
    .photo-placeholder {
      width: 100%; height: 220px; background: #d8d8d8;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .photo-placeholder svg { width: 56px; height: 56px; stroke: #555; fill: none; stroke-width: 1.5; }
    .add-img-btn {
      width: 100%; background: #2a6a7a; color: #fff;
      border: none; border-radius: 8px; padding: 12px;
      font-size: 16px; font-weight: 900; cursor: pointer;
      margin-bottom: 12px; transition: background 0.2s;
    }
    .add-img-btn:hover { background: #1e5a6e; }
    .send-btn {
      width: 100%; background: #1e4a5a; color: #fff;
      border: none; border-radius: 30px; padding: 13px;
      font-size: 17px; font-weight: 900; cursor: pointer;
      text-decoration: none; display: block; text-align: center;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #162d3a; }

    @media (max-width: 768px) {
      .form-card {
        padding: 24px 16px;
        min-height: 100vh;
      }
      
      .form-title {
        font-size: 22px;
        margin-top: 10px;
      }

      /* Shrink the close button so it doesn't overlap titles on narrow phones */
      .close-btn {
        top: 12px; 
        right: 12px;
        width: 32px; 
        height: 32px;
        font-size: 16px;
      }

      /* Collapse the main 2-column layout into a single column */
      .form-body { 
        grid-template-columns: 1fr; 
        gap: 20px; 
      }

      /* Swap layout order: Put the main submission button / photo at the bottom of the scroll */
      .form-body .right-col {
        order: 2;
      }
      .form-body .left-col {
        order: 1;
      }

      /* Make dates stack instead of squeezing side-by-side */
      .date-row { 
        flex-direction: column; 
        gap: 12px; 
      }

      /* Collapse the complex 3-column entries panel into vertically stacked blocks */
      .entries-panel { 
        display: flex;
        flex-direction: column;
      }
      
      .entry-img-col {
        padding: 16px;
        border-bottom: 1px solid #162d3a;
      }

      .entry-list-col {
        border-top: 1px solid #2a4a5a;
        padding: 16px 12px;
      }

      .photo-placeholder {
        height: 180px;
      }
    }

  </style>
</head>
<body>

  <span id="sent"></span>

  <!-- Success toast -->
  <div class="toast">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    Request submitted successfully!
  </div>

  <div class="layout">


  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="Home.html">
        <img class="logo" src="Image/uVote-transparent.png" alt="Uvote Logo">
      <span class="brand-name">UVote</span>
    </a>
    
    <div class="user-info">
      <span>User</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="User Profile">
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-btn active" href="Home.html">Home</a>
    <a class="nav-btn" href="Settings.html">Settings</a>
    <a class="nav-btn" href="Message.html">Messages</a>
    <a class="nav-btn" href="Schedule.html">Schedule</a>
    <a class="nav-btn" href="requestPending.html">Request</a>
    <div class="sidebar-spacer"></div>
    <a class="nav-btn" href="index.html">Logout</a>
  </aside>

    <!-- Main -->
    <main class="main">
      <div class="form-card">
        <div class="form-title">Request Form</div>
        <a class="close-btn" href="requestPending.html">&times;</a>

        <div class="form-body">
          <!-- LEFT COLUMN -->
          <div>
            <div class="section-heading">Event Details:</div>

            <div class="field">
              <label>Name: <span class="req">required</span></label>
              <input type="text" />
            </div>
            <div class="field">
              <label>Type: <span class="req">required</span></label>
              <input type="text" />
            </div>
            <div class="field">
              <label>Description: <span class="req">required</span></label>
              <input type="text" />
            </div>

            <div class="date-row">
              <div class="date-group">
                <label>Starts in:</label>
                <input type="date" placeholder="mm/dd/yy" />
              </div>
              <div class="date-group">
                <label>Ends in: <span class="req">required</span></label>
                <input type="date" placeholder="mm/dd/yy" />
              </div>
            </div>

            <div class="entries-label">Entries: <span class="req">required</span></div>
            <div class="entries-panel">
              <!-- Image upload -->
              <div class="entry-img-col">
                <div class="img-placeholder-sm">
                  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="14" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/><line x1="19" y1="19" x2="21" y2="21"/></svg>
                </div>
                <button class="add-img-btn-sm">Add Image</button>
              </div>
              <!-- Fields -->
              <div class="entry-fields-col">
                <label>Name</label>
                <input type="text" />
                <label>Description</label>
                <textarea placeholder="Optional"></textarea>
                <button class="add-entry-btn">Add Entry</button>
              </div>
              <!-- Entry list -->
              <div class="entry-list-col">
                <div class="list-title">List of Entries</div>
                <div class="entry-row"><div class="entry-thumb"></div><div class="entry-line"></div></div>
                <div class="entry-row"><div class="entry-thumb"></div><div class="entry-line"></div></div>
                <div class="entry-row"><div class="entry-thumb"></div><div class="entry-line"></div></div>
                <div class="entry-row"><div class="entry-thumb"></div><div class="entry-line"></div></div>
              </div>
            </div>
          </div>

          <!-- RIGHT COLUMN -->
          <div>
            <div class="photo-label">Event Photo <span class="req">required</span></div>
            <div class="photo-placeholder">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="14" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/><line x1="19" y1="19" x2="21" y2="21"/></svg>
            </div>
            <button class="add-img-btn">Add Image</button>
            <a class="send-btn" href="#sent">Send Request</a>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
