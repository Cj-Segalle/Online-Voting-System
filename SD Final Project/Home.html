<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
  <title>UVote - Dashboard</title>
</head>
<style>
      .vote-link-btn {
      display: inline-block;
      margin-top: 8px;
      background: #fff;
      color: #1e5a6e;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .vote-link-btn:hover { background: #1e5a6e; color: #fff; border: 1px solid #fff; }

        /* LAPTOP (Under 1024px) */
    @media (max-width: 1024px) {
      .hero-name {
        font-size: 52px;
      }
      .hero-icon {
        width: 58px;
        height: 58px;
      }
      .blob-tl {
        width: 350px;
        height: 350px;
      }
      .blob-br {
        width: 320px;
        height: 320px;
      }
    }

    /* MOBILE  (Under 768px) */
    @media (max-width: 768px) {
      .navbar {
        padding: 12px 20px; 
      }
      
      .brand-name {
        font-size: 19px;
      }

      .register-btn {
        padding: 8px 18px;
        font-size: 13px;
      }

      .hero-brand {
        gap: 12px;
        margin-bottom: 28px;
      }

      .hero-icon {
        width: 46px;
        height: 46px;
      }

      .hero-name {
        font-size: 38px; /* Prevents text overflow on small phone screens */
      }

      .login-form {
        max-width: 280px; /* Balances aesthetic form structure on tiny screens */
      }

      /* Shrink background blobs so they don't overpower elements on small glass profiles */
      .blob-tl {
        width: 240px;
        height: 240px;
        top: -50px;
        left: -80px;
      }
      .blob-br {
        width: 220px;
        height: 220px;
        bottom: -60px;
        right: -60px;
      }
    }



  </style>
</style>
<body>

<div class="layout">

  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="Home.html">
        <img class="logo" src="Image/uVote-transparent.png" alt="Uvote Logo">
      <span class="brand-name">UVote</span>
    </a>

    <div class="user-info">
      <span>User</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="User Profile">
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-btn active" href="Home.html">Home</a>
    <a class="nav-btn" href="Settings.html">Settings</a>
    <a class="nav-btn" href="Message.html">Messages</a>
    <a class="nav-btn" href="Schedule.html">Schedule</a>
    <a class="nav-btn" href="requestPending.html">Request</a>
    <div class="sidebar-spacer"></div>
    <a class="nav-btn" href="index.html">Logout</a>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="blob blob-tr"></div>
    <div class="blob blob-bl"></div>

    <div class="main-inner">

      <h1 class="dash-title">Dashboard</h1>
      <p class="dash-sub">Welcome User!</p>

      <!-- Search -->
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="search" />
      </div>

      <!-- Filters -->
      <div class="filters">
        <span>Filters:</span>
        <a class="filter-btn" href="filterFinished.html">Finished</a>
        <a class="filter-btn" href="filterOngoing.html">Ongoing</a>
      </div>

      <!-- Award cards -->
      <div class="cards-grid">
 
        <!-- The Game Awards -->
        <div class="award-card">
          <div class="award-banner banner-tga">
            <div>
              <div style="font-size:11px;letter-spacing:2px;"></div>
              THE<br>GAME<br>AWARDS
            </div>
          </div>
          <div class="award-badge">
            <span class="badge-main">Vote Now</span>
            <span class="badge-sub">Status:<br>Ongoing</span>
            <a class="vote-link-btn" href="votingPage.html">Go Vote</a>
          </div>
        </div>

        <!-- Grammy Awards -->
        <div class="award-card">
          <div class="award-banner banner-grammy">
            RECORDING ACADEMY<br>GRAMMY<br>AWARDS
          </div>  
          <div class="award-badge">
            <span class="badge-main">Already<br>Voted</span>
          </div>
        </div>

        <!-- Kids' Choice Awards -->
        <div class="award-card">
          <div class="award-banner banner-kca">
            KIDS'<br>CHOICE<br>AWARDS
          </div>
          <div class="award-badge">
            <span class="badge-main">Already<br>Voted</span>
          </div>
        </div>

        <!-- MTV VMAs -->
        <div class="award-card">
          <div class="award-banner banner-vma">
            <div>
              <div style="font-size:28px;font-weight:900;letter-spacing:-1px;">VMA</div>
              <div style="font-size:11px;letter-spacing:2px;">VIDEO MUSIC AWARDS</div>
            </div>
          </div>
          <div class="award-badge">
            <span class="badge-main">Already<br>Voted</span>
          </div>
        </div>

      </div>
    </div>
  </main>

</div>

</body>
</html>
