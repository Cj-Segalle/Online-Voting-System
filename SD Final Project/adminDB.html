<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/admin.css">  
  <title>UVote - Admin Dashboard</title>
  <style>

    /* ── Main ── */
    .main {
      background: #1e4a5a;
      padding: 36px 40px;
      overflow-y: auto;
    }

    .welcome { font-size: 36px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 28px; }

    /* ── Stats row ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }

    .stat-card {
      background: #0d2233;
      border-radius: 12px; padding: 20px 22px;
      color: #fff; min-height: 110px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .stat-label { font-size: 15px; font-weight: 700; color: #c8d8e0; margin-bottom: 10px; }
    .stat-value { font-size: 34px; font-weight: 900; color: #fff; }

    /* Active vs Inactive bars */
    .bar-group { display: flex; flex-direction: column; gap: 6px; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #c8d8e0; }
    .bar-track { flex: 1; height: 10px; border-radius: 6px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; }
    .bar-active  .bar-fill { background: #22c55e; width: 75%; }
    .bar-inactive .bar-fill { background: #ef4444; width: 40%; }

    /* ── Most voted card ── */
    .voted-card {
      background: #0d2233;
      border-radius: 14px; padding: 24px 28px;
      max-width: 460px; margin: 0 auto;
      text-align: center;
    }
    .voted-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 16px; }
    .voted-img {
      width: 100%; max-width: 320px;
      border-radius: 8px; margin: 0 auto 14px;
      display: block;
    }
    .voted-name { font-size: 15px; font-weight: 600; color: #c8d8e0; margin-bottom: 14px; }
    .votes-pill {
      display: inline-block;
      background: #fff; color: #111;
      border-radius: 24px; padding: 8px 28px;
      font-size: 16px; font-weight: 800;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="brand" href="#">
      <div class="brand-icon">
        <img class="logo" src="Image/uVote-transparent.png" alt="UVote Logo">
      </div>
      <span class="brand-name">UVote</span>
    </a>
    <a class="nav-item active" href="adminDB.html">Home</a>
    <a class="nav-item" href="adminUM.html">User Management</a>
    <a class="nav-item" href="adminEM.html">Event Management</a>
    <a class="nav-item" href="adminReq.html">Requests</a>
    <a class="nav-item" href="adminAnalytics.html">Analytics</a>
    <a class="nav-item" href="adminSettings.html">Settings</a>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-title">Dashboard</span>
    <div class="topbar-right">
      <span class="admin-name">Admin</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="Admin Profile">
      </div>
      <a class="logout-btn" href="loginAdmin.html">Logout</a>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="welcome">Welcome Admin</div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Users:</div>
        <div class="stat-value">124,293</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Active vs Inactive Users</div>
        <div class="bar-group">
          <div class="bar-row bar-active">
            <span>Active</span>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
          <div class="bar-row bar-inactive">
            <span>Inactive</span>
            <div class="bar-track"><div class="bar-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Pending Event Request:</div>
        <div class="stat-value">1</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Active Events:</div>
        <div class="stat-value">4</div>
      </div>
    </div>

    <!-- Most Voted -->
    <div class="voted-card">
      <div class="voted-title">Most voted event this week</div>
      <img class="voted-img"
        src="https://images.seeklogo.com/logo-png/39/1/the-game-awards-2020-logo-png_seeklogo-393665.png"
        alt="The Game Awards" />
      <div class="voted-name">The Game Awards</div>
      <span class="votes-pill">Total votes: 4,809</span>
    </div>
  </main>

</body>
</html>
