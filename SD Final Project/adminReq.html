<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/admin.css">
  <title>UVote - Requests</title>
  <style>
   
    .main {
      background: #1e4a5a;
      padding: 20px 28px;
      overflow-y: auto;
    }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 5px 22px; border-radius: 20px;
      border: 2px solid #a0b8c4;
      background: transparent; color: #e0eaee;
      font-size: 14px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.15); }
    .tab-btn.active { background: #c8d8e0; color: #1e4a5a; border-color: #c8d8e0; }

    /* Request card */
    .request-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .request-left { display: flex; flex-direction: column; gap: 10px; }
    .request-title { font-size: 18px; font-weight: 900; color: #111; }
    .request-actions-left { display: flex; gap: 8px; }

    .btn-outline {
      padding: 5px 18px; border-radius: 20px;
      border: 2px solid #333; background: transparent;
      color: #111; font-size: 14px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-outline:hover { background: #f0f0f0; }

    .request-actions-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn-approve {
      padding: 6px 18px; border-radius: 20px;
      background: #2a7a6e; color: #fff;
      border: none; font-size: 14px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .btn-approve:hover { background: #1e6060; }

    .btn-reject {
      padding: 6px 18px; border-radius: 20px;
      background: #e03030; color: #fff;
      border: none; font-size: 14px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .btn-reject:hover { background: #b02020; }

    .btn-revision {
      padding: 6px 18px; border-radius: 20px;
      background: #2a7a6e; color: #fff;
      border: none; font-size: 14px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-revision:hover { background: #1e6060; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="brand" href="#">
      <div class="brand-icon">
        <img class="logo" src="Image/uVote-transparent.png" alt="UVote Logo">
      </div>
      <span class="brand-name">UVote</span>
    </a>
    <a class="nav-item" href="adminDB.html">Home</a>
    <a class="nav-item" href="adminUM.html">User Management</a>
    <a class="nav-item" href="adminEM.html">Event Management</a>
    <a class="nav-item active" href="adminReq.html">Requests</a>
    <a class="nav-item" href="adminAnalytics.html">Analytics</a>
    <a class="nav-item" href="adminSettings.html">Settings</a>
  </aside>

  <header class="topbar">
    <span class="topbar-title">Requests</span>
    <div class="topbar-right">
      <span class="admin-name">Admin</span>
      <div class="avatar">
        <img src="Image/blank profile.png" alt="Admin Profile">
      </div>
      <a class="logout-btn" href="loginAdmin.html">Logout</a>
    </div>
  </header>

  <main class="main">
    <div class="filter-tabs">
      <a class="tab-btn active" href="#">All</a>
      <a class="tab-btn" href="#">Approved</a>
      <a class="tab-btn" href="#">Rejected</a>
    </div>

    <div class="request-card">
      <div class="request-left">
        <div class="request-title">someone@gmail.com submitted a request</div>
        <div class="request-actions-left">
          <a class="btn-outline" href="#">Message</a>
          <a class="btn-outline" href="#">View Request</a>
        </div>
      </div>
      <div class="request-actions-right">
        <a class="btn-approve" href="#">Approve</a>
        <a class="btn-reject" href="#">Reject</a>
        <a class="btn-revision" href="#">Return for revision</a>
      </div>
    </div>
  </main>

</body>
</html>
