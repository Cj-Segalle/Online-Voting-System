<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/registration.css">
  <title>UVote - Registration</title>
</head>
<body>

  <div class="page">
    <div class="blob blob-tl"></div>
    <div class="blob blob-br"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="Home.html">
        <img class="logo" src="Image/uVote-transparent.png" alt="Uvote Logo">
      <span class="brand-name">UVote</span>
    </a>
  </nav>

    <div class="content">
      <h1 class="page-title">Registration</h1>

      <!-- id="success" is the :target anchor -->
      <div class="card" id="success">

        <!-- Success banner — shown only when #success is in the URL -->
        <div class="success-banner">
          <div class="check-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          Account created successfully
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
        </div>
        <div class="form-group">
          <label for="confirm-email">Confirm Email</label>
          <input type="email" id="confirm-email" name="confirm-email" />
        </div>

        <div class="btn-row">
          <a class="btn" href="index.html">Return</a>
          <a class="btn" href="#success">Create Account</a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
